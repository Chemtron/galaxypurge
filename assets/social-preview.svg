<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="purge2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg2)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#ff4444" stroke-width="0.5">
    <line x1="0" y1="128" x2="1280" y2="128"/>
    <line x1="0" y1="256" x2="1280" y2="256"/>
    <line x1="0" y1="384" x2="1280" y2="384"/>
    <line x1="0" y1="512" x2="1280" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="640"/>
    <line x1="512" y1="0" x2="512" y2="640"/>
    <line x1="768" y1="0" x2="768" y2="640"/>
    <line x1="1024" y1="0" x2="1024" y2="640"/>
  </g>

  <!-- Decorative blobs -->
  <circle cx="1100" cy="150" r="200" fill="#ff4444" opacity="0.03"/>
  <circle cx="200" cy="500" r="150" fill="#4488ff" opacity="0.03"/>

  <!-- Red accent line -->
  <rect x="638" y="150" width="4" height="80" fill="url(#purge2)" rx="2"/>

  <!-- Title -->
  <text x="640" y="300" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="96" font-weight="800" text-anchor="middle" letter-spacing="-3">
    <tspan fill="#ffffff">Galaxy</tspan><tspan fill="url(#purge2)">Purge</tspan>
  </text>

  <!-- Subtitle -->
  <text x="640" y="355" font-family="'SF Pro Text', 'Segoe UI', Arial, sans-serif" font-size="28" fill="#888888" text-anchor="middle" font-weight="400" letter-spacing="2">
    Samsung Galaxy Debloater &amp; Privacy Hardener
  </text>

  <!-- Stats -->
  <g transform="translate(640, 420)" text-anchor="middle">
    <text x="-250" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="36" fill="#ff6b6b" font-weight="700">59</text>
    <text x="-250" y="28" font-family="'SF Pro Text', 'Segoe UI', Arial, sans-serif" font-size="14" fill="#ff6b6b" opacity="0.7">SPYWARE</text>

    <text x="-80" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="36" fill="#6699ff" font-weight="700">173</text>
    <text x="-80" y="28" font-family="'SF Pro Text', 'Segoe UI', Arial, sans-serif" font-size="14" fill="#6699ff" opacity="0.7">PACKAGES</text>

    <text x="80" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="36" fill="#66dd66" font-weight="700">0</text>
    <text x="80" y="28" font-family="'SF Pro Text', 'Segoe UI', Arial, sans-serif" font-size="14" fill="#66dd66" opacity="0.7">ROOT NEEDED</text>

    <text x="250" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="36" fill="#eebb33" font-weight="700">1</text>
    <text x="250" y="28" font-family="'SF Pro Text', 'Segoe UI', Arial, sans-serif" font-size="14" fill="#eebb33" opacity="0.7">COMMAND</text>
  </g>

  <!-- Terminal line -->
  <text x="640" y="530" font-family="'SF Mono', 'Cascadia Code', 'Consolas', monospace" font-size="20" fill="#555555" text-anchor="middle">
    <tspan fill="#666">$</tspan><tspan fill="#aaa"> ./debloat.sh --spyware</tspan>
  </text>

  <!-- Bottom tagline -->
  <text x="640" y="600" font-family="'SF Pro Text', 'Segoe UI', Arial, sans-serif" font-size="16" fill="#444444" text-anchor="middle" letter-spacing="3">
    YOUR PHONE. YOUR DATA. YOUR CHOICE.
  </text>
</svg>
