<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="purge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff4444;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#ff4444" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Decorative phone silhouette -->
  <g transform="translate(90, 60)" opacity="0.15">
    <rect x="0" y="0" width="120" height="240" rx="16" fill="none" stroke="#ff6b6b" stroke-width="2"/>
    <rect x="40" y="8" width="40" height="6" rx="3" fill="#ff6b6b"/>
    <circle cx="60" cy="220" r="12" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
    <!-- X marks on phone screen representing deleted packages -->
    <g stroke="#ff4444" stroke-width="2.5" opacity="0.8">
      <line x1="25" y1="55" x2="35" y2="65"/><line x1="35" y1="55" x2="25" y2="65"/>
      <line x1="55" y1="55" x2="65" y2="65"/><line x1="65" y1="55" x2="55" y2="65"/>
      <line x1="85" y1="55" x2="95" y2="65"/><line x1="95" y1="55" x2="85" y2="65"/>
      <line x1="25" y1="90" x2="35" y2="100"/><line x1="35" y1="90" x2="25" y2="100"/>
      <line x1="55" y1="90" x2="65" y2="100"/><line x1="65" y1="90" x2="55" y2="100"/>
      <line x1="85" y1="90" x2="95" y2="100"/><line x1="95" y1="90" x2="85" y2="100"/>
      <line x1="25" y1="125" x2="35" y2="135"/><line x1="35" y1="125" x2="25" y2="135"/>
      <line x1="55" y1="125" x2="65" y2="135"/><line x1="65" y1="125" x2="55" y2="135"/>
      <line x1="85" y1="125" x2="95" y2="135"/><line x1="95" y1="125" x2="85" y2="135"/>
    </g>
  </g>

  <!-- Red accent line -->
  <rect x="280" y="120" width="4" height="160" fill="url(#purge)" rx="2" filter="url(#glow)"/>

  <!-- Main title -->
  <text x="310" y="175" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">
    <tspan fill="#ffffff">Galaxy</tspan><tspan fill="url(#purge)">Purge</tspan>
  </text>

  <!-- Subtitle -->
  <text x="310" y="215" font-family="'SF Pro Text', 'Segoe UI', Arial, sans-serif" font-size="22" fill="#888888" font-weight="400" letter-spacing="1">
    Samsung Galaxy Debloater &amp; Privacy Hardener
  </text>

  <!-- Stats bar -->
  <g transform="translate(310, 250)">
    <!-- Spyware count -->
    <rect x="0" y="0" width="140" height="44" rx="8" fill="#ff4444" fill-opacity="0.15" stroke="#ff4444" stroke-opacity="0.3" stroke-width="1"/>
    <text x="70" y="18" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="14" fill="#ff6b6b" text-anchor="middle" font-weight="700">59 SPYWARE</text>
    <text x="70" y="35" font-family="'SF Pro Text', 'Segoe UI', Arial, sans-serif" font-size="11" fill="#ff6b6b" text-anchor="middle" opacity="0.7">packages found</text>

    <!-- Total packages -->
    <rect x="155" y="0" width="140" height="44" rx="8" fill="#4488ff" fill-opacity="0.1" stroke="#4488ff" stroke-opacity="0.3" stroke-width="1"/>
    <text x="225" y="18" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="14" fill="#6699ff" text-anchor="middle" font-weight="700">173 TOTAL</text>
    <text x="225" y="35" font-family="'SF Pro Text', 'Segoe UI', Arial, sans-serif" font-size="11" fill="#6699ff" text-anchor="middle" opacity="0.7">packages disabled</text>

    <!-- No root -->
    <rect x="310" y="0" width="140" height="44" rx="8" fill="#44cc44" fill-opacity="0.1" stroke="#44cc44" stroke-opacity="0.3" stroke-width="1"/>
    <text x="380" y="18" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="14" fill="#66dd66" text-anchor="middle" font-weight="700">NO ROOT</text>
    <text x="380" y="35" font-family="'SF Pro Text', 'Segoe UI', Arial, sans-serif" font-size="11" fill="#66dd66" text-anchor="middle" opacity="0.7">required</text>

    <!-- Reversible -->
    <rect x="465" y="0" width="140" height="44" rx="8" fill="#ddaa00" fill-opacity="0.1" stroke="#ddaa00" stroke-opacity="0.3" stroke-width="1"/>
    <text x="535" y="18" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="14" fill="#eebb33" text-anchor="middle" font-weight="700">REVERSIBLE</text>
    <text x="535" y="35" font-family="'SF Pro Text', 'Segoe UI', Arial, sans-serif" font-size="11" fill="#eebb33" text-anchor="middle" opacity="0.7">--undo to restore</text>
  </g>

  <!-- Terminal snippet -->
  <g transform="translate(310, 315)">
    <text font-family="'SF Mono', 'Cascadia Code', 'Consolas', monospace" font-size="15" fill="#555555">$</text>
    <text x="20" font-family="'SF Mono', 'Cascadia Code', 'Consolas', monospace" font-size="15" fill="#aaaaaa">./debloat.sh --spyware</text>
    <text x="310" font-family="'SF Mono', 'Cascadia Code', 'Consolas', monospace" font-size="15" fill="#444444"> # purge 59 spyware packages</text>
  </g>

  <!-- Decorative dots -->
  <g opacity="0.05">
    <circle cx="1050" cy="80" r="120" fill="#ff4444"/>
    <circle cx="1150" cy="350" r="80" fill="#4488ff"/>
  </g>
</svg>
